name: Build Latest Release APK

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag"
        required: true
        default: "v1.0.0"
      release_title:
        description: "Release title"
        required: true
        default: "Balkes Skor v1.0.0"

permissions:
  contents: write

env:
  APK_NAME: BalkesSkor-v1.0.0.apk

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Verify Firebase config
        run: |
          test -f app/google-services.json || (echo "app/google-services.json yok. Production Firebase dosyasını app klasörüne koyup commit/push yap." && exit 1)
          grep -q 'com.sinanjam.balkesskor' app/google-services.json || (echo "google-services.json production paket adı com.sinanjam.balkesskor içermiyor." && exit 1)

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build signed release APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle --no-daemon assembleRelease
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          ls -lh "$APK_NAME"

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG" --force
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
          TITLE: ${{ github.event.inputs.release_title }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_NAME" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$TAG" "$APK_NAME" --title "$TITLE" --notes-file RELEASE_NOTES.md --latest
          fi
