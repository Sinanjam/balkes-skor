name: TFF Factory v3.3 Targeted Data + Standings

on:
  workflow_dispatch:
    inputs:
      start_season:
        description: "Başlangıç sezonu. Örnek: 2025-2026"
        required: true
        default: "2025-2026"
      max_seasons:
        description: "Bu run içinde kaç sezon işlensin? Öneri: 4"
        required: true
        default: "4"
      clean_database_mode:
        description: "true: data'yı yedekle, tamamen temizle, sonra yeniden üret."
        required: true
        type: boolean
        default: false
      auto_push_main:
        description: "Validation geçerse main'e otomatik pushla."
        required: true
        type: boolean
        default: true
      run_gemini:
        description: "Sadece diagnostic için Gemini çalıştır."
        required: true
        type: boolean
        default: false
      skip_standings:
        description: "true: sadece maç verisi. false: maç verisinden sonra puan tablolarını da üret."
        required: true
        type: boolean
        default: false
      standings_mode:
        description: "Puan tablosu modu: auto, official-only, computed-only"
        required: true
        default: "auto"
      standings_detail_mode:
        description: "Tablo hesaplama detay modu: missing, all, none. En doğru: all; dengeli: missing."
        required: true
        default: "missing"
      standings_workers:
        description: "Puan tablosu detay çekimi paralel işçi sayısı. Öneri: 6"
        required: true
        default: "6"
      standings_week_param_mode:
        description: "Hafta parametre modu: smart, fast, wide"
        required: true
        default: "smart"
      legacy_broad_probe_limit:
        description: "Sadece exact target/known macId olan legacy sezonlarda geniş aday limiti. Exact target yoksa kullanılmaz."
        required: true
        default: "350"
      strict_legacy_targets:
        description: "Eski sezonlarda kör current-page taramayı kapat; varsa güvenli bounded pageID probe kullan."
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: tff-factory-manual-clean-db
  cancel-in-progress: false

jobs:
  tff-factory:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser deps
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml

      - name: Prepare git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --rebase --autostash origin main

      - name: Backup current data before clean
        if: ${{ github.event.inputs.clean_database_mode == 'true' }}
        run: |
          python scripts/backup_current_data.py --data-root data --reports-root reports/tff_factory

      - name: Initialize clean database
        if: ${{ github.event.inputs.clean_database_mode == 'true' }}
        run: |
          python scripts/clean_database.py --data-root data

      - name: Run TFF Factory v3.3 targeted senior professional
        env:
          PYTHONUNBUFFERED: "1"
        shell: bash
        run: |
          python scripts/tff_factory_v33_targeted_professional.py \
            --seed sources/tff/registry/balkes_tff_seed_registry.json \
            --data-root data \
            --raw-root sources/tff/raw \
            --reports-root reports/tff_factory \
            --start-season "${{ github.event.inputs.start_season }}" \
            --max-seasons "${{ github.event.inputs.max_seasons }}" \
            --sleep "1.0" \
            --max-discovery-probe "1500" \
            --legacy-broad-probe-limit "${{ github.event.inputs.legacy_broad_probe_limit }}" \
            ${{ github.event.inputs.strict_legacy_targets == 'true' && '--strict-legacy-targets' || '--no-strict-legacy-targets' }} \
            --skip-standings

      - name: Clean targeted senior professional data
        run: |
          python scripts/clean_bad_professional_data_v33.py --data-root data --reports-root reports/tff_factory --write

      - name: Validate produced match data
        run: |
          python scripts/validate_data.py --data-root data --min-seasons 1 --min-matches 1
          python scripts/validate_target_data_v33.py --data-root data --reports-root reports/tff_factory --start-season "${{ github.event.inputs.start_season }}" --max-seasons "${{ github.event.inputs.max_seasons }}" --strict

      - name: Run Standings Builder clean tables
        if: ${{ github.event.inputs.skip_standings == 'false' }}
        env:
          PYTHONUNBUFFERED: "1"
        shell: bash
        run: |
          if [ -f scripts/tff_standings_builder_v31.py ]; then STANDINGS_SCRIPT=scripts/tff_standings_builder_v31.py; else STANDINGS_SCRIPT=scripts/tff_standings_builder.py; fi
          python "$STANDINGS_SCRIPT" \
            --seed sources/tff/registry/balkes_tff_seed_registry.json \
            --data-root data \
            --raw-root sources/tff/standings_raw \
            --reports-root reports/standings \
            --penalties data/standings_penalties.json \
            --start-season "${{ github.event.inputs.start_season }}" \
            --max-seasons "${{ github.event.inputs.max_seasons }}" \
            --mode "${{ github.event.inputs.standings_mode }}" \
            --probe-limit "5000" \
            --workers "${{ github.event.inputs.standings_workers }}" \
            --detail-fetch-mode "${{ github.event.inputs.standings_detail_mode }}" \
            --week-param-mode "${{ github.event.inputs.standings_week_param_mode }}" \
            --sleep "0.15"

      - name: Gemini diagnostics
        if: ${{ always() && github.event.inputs.run_gemini == 'true' }}
        run: |
          python scripts/gemini_tff_helper.py

      - name: Upload raw/report/backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tff-factory-v33-targeted-${{ github.event.inputs.start_season }}-${{ github.run_id }}
          path: |
            data/**/*.json
            reports/tff_factory/**/*.json
            reports/standings/**/*.json
            reports/tff_factory/backups/*.zip
            sources/tff/raw/**/*.html
            sources/tff/raw/**/*.txt
            sources/tff/standings_raw/**/*.html
            sources/tff/standings_raw/**/*.txt
          if-no-files-found: ignore

      - name: Commit and push to main
        if: ${{ success() && github.event.inputs.auto_push_main == 'true' }}
        shell: bash
        run: |
          set -e
          AVAILABLE_SEASONS=$(python scripts/live_data_counts_v33.py --field seasons)
          TOTAL_MATCHES=$(python scripts/live_data_counts_v33.py --field matches)
          echo "Safety gate: availableSeasons=$AVAILABLE_SEASONS totalAppMatches=$TOTAL_MATCHES"
          if [ "$AVAILABLE_SEASONS" = "0" ] || [ "$TOTAL_MATCHES" = "0" ]; then
            echo "::error::Refusing to push empty live data. Check artifacts/reports before retrying."
            exit 1
          fi

          git add -A data reports/tff_factory reports/standings sources/tff/registry sources/tff/state .gitignore
          git reset -- sources/tff/raw || true
          git reset -- sources/tff/standings_raw || true
          git reset -- reports/tff_factory/backups || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          if [ "${{ github.event.inputs.skip_standings }}" = "false" ]; then
            git commit -m "Build targeted TFF data and standings from ${{ github.event.inputs.start_season }} (${{ github.event.inputs.max_seasons }} seasons)"
          else
            git commit -m "Build targeted TFF data from ${{ github.event.inputs.start_season }} (${{ github.event.inputs.max_seasons }} seasons)"
          fi
          git checkout -- sources/tff/raw sources/tff/standings_raw reports/tff_factory/backups 2>/dev/null || true
          git clean -fd sources/tff/raw sources/tff/standings_raw reports/tff_factory/backups 2>/dev/null || true
          git pull --rebase --autostash origin main
          git push origin HEAD:main
