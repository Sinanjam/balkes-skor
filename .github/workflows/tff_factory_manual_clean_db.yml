name: TFF Factory v3.2 Integrated Data + Standings

on:
  workflow_dispatch:
    inputs:
      start_season:
        description: "Başlangıç sezonu. Örnek: 2025-2026"
        required: true
        default: "2025-2026"
      max_seasons:
        description: "Bu run içinde kaç sezon işlensin? Öneri: 3"
        required: true
        default: "3"
      clean_database_mode:
        description: "İlk temiz DB run'ında true. Sonraki run'larda false."
        required: true
        type: boolean
        default: false
      auto_push_main:
        description: "Validation geçerse main'e otomatik pushla."
        required: true
        type: boolean
        default: true
      run_gemini:
        description: "Sadece diagnostic için Gemini çalıştır."
        required: true
        type: boolean
        default: false
      skip_standings:
        description: "true: sadece maç verisi. false: maç verisinden sonra puan tablolarını da üret."
        required: true
        type: boolean
        default: true
      standings_mode:
        description: "Puan tablosu modu: auto, official-only, computed-only"
        required: true
        default: "auto"
      standings_detail_mode:
        description: "Tablo hesaplama detay modu: missing, all, none. En doğru: all; dengeli: missing."
        required: true
        default: "missing"
      standings_workers:
        description: "Puan tablosu detay çekimi paralel işçi sayısı. Öneri: 6"
        required: true
        default: "6"
      standings_week_param_mode:
        description: "Hafta parametre modu: smart, fast, wide"
        required: true
        default: "smart"
      legacy_broad_probe_limit:
        description: "Sadece exact target/known macId olan legacy sezonlarda geniş aday limiti. Exact target yoksa kullanılmaz."
        required: true
        default: "350"
      strict_legacy_targets:
        description: "Eski sezonlarda kör current-page taramayı kapat; varsa güvenli bounded pageID probe kullan."
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: tff-factory-manual-clean-db
  cancel-in-progress: false

jobs:
  tff-factory:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser deps
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml

      - name: Prepare git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --rebase --autostash origin main

      - name: Backup current data before clean
        if: ${{ github.event.inputs.clean_database_mode == 'true' }}
        run: |
          python scripts/backup_current_data.py --data-root data --reports-root reports/tff_factory

      - name: Initialize clean database
        if: ${{ github.event.inputs.clean_database_mode == 'true' }}
        run: |
          python scripts/clean_database.py --data-root data

      - name: Run TFF Factory v3.2 senior professional guard
        env:
          PYTHONUNBUFFERED: "1"
        shell: bash
        run: |
          python scripts/tff_factory_v32_senior_professional_guard.py \
            --seed sources/tff/registry/balkes_tff_seed_registry.json \
            --data-root data \
            --raw-root sources/tff/raw \
            --reports-root reports/tff_factory \
            --start-season "${{ github.event.inputs.start_season }}" \
            --max-seasons "${{ github.event.inputs.max_seasons }}" \
            --sleep "1.0" \
            --max-discovery-probe "1500" \
            --legacy-broad-probe-limit "${{ github.event.inputs.legacy_broad_probe_limit }}" \
            ${{ github.event.inputs.strict_legacy_targets == 'true' && '--strict-legacy-targets' || '--no-strict-legacy-targets' }} \
            --skip-standings

      - name: Clean senior professional data guard
        run: |
          python scripts/clean_bad_professional_data_v32.py --data-root data --reports-root reports/tff_factory --write

      - name: Validate produced match data
        run: |
          python scripts/validate_data.py --data-root data --min-seasons 1 --min-matches 1

      - name: Run Standings Builder v3 clean tables
        if: ${{ github.event.inputs.skip_standings == 'false' }}
        env:
          PYTHONUNBUFFERED: "1"
        shell: bash
        run: |
          python scripts/tff_standings_builder.py \
            --seed sources/tff/registry/balkes_tff_seed_registry.json \
            --data-root data \
            --raw-root sources/tff/standings_raw \
            --reports-root reports/standings \
            --penalties data/standings_penalties.json \
            --start-season "${{ github.event.inputs.start_season }}" \
            --max-seasons "${{ github.event.inputs.max_seasons }}" \
            --mode "${{ github.event.inputs.standings_mode }}" \
            --probe-limit "5000" \
            --workers "${{ github.event.inputs.standings_workers }}" \
            --detail-fetch-mode "${{ github.event.inputs.standings_detail_mode }}" \
            --week-param-mode "${{ github.event.inputs.standings_week_param_mode }}" \
            --sleep "0.15" \
            --allow-partial

      - name: Validate standings outputs
        if: ${{ github.event.inputs.skip_standings == 'false' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          start = "${{ github.event.inputs.start_season }}"
          max_seasons = int("${{ github.event.inputs.max_seasons }}")
          summary = Path("reports/standings/last_run_summary.json")
          if not summary.exists():
              raise SystemExit("reports/standings/last_run_summary.json yok")
          data = json.loads(summary.read_text(encoding="utf-8"))
          produced = [s for s in data.get("seasons", []) if s.get("weeksGenerated")]
          if not produced:
              raise SystemExit("Hiç puan tablosu üretilmedi")
          print("standings seasons produced:", ", ".join(s.get("season", "?") for s in produced))
          for s in produced:
              if not s.get("balkesFinal"):
                  print("warning: Balkes row yok:", s.get("season"))
          PY

      - name: Gemini diagnostics
        if: ${{ always() && github.event.inputs.run_gemini == 'true' }}
        run: |
          python scripts/gemini_tff_helper.py

      - name: Upload raw/report/backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tff-factory-v32-integrated-${{ github.event.inputs.start_season }}-${{ github.run_id }}
          path: |
            reports/tff_factory/**/*.json
            reports/standings/**/*.json
            reports/tff_factory/backups/*.zip
            sources/tff/raw/**/*.html
            sources/tff/raw/**/*.txt
            sources/tff/standings_raw/**/*.html
            sources/tff/standings_raw/**/*.txt
          if-no-files-found: ignore

      - name: Commit and push to main
        if: ${{ success() && github.event.inputs.auto_push_main == 'true' }}
        shell: bash
        run: |
          git add -A data reports/tff_factory reports/standings sources/tff/registry sources/tff/state .gitignore
          git reset -- sources/tff/raw || true
          git reset -- sources/tff/standings_raw || true
          git reset -- reports/tff_factory/backups || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          if [ "${{ github.event.inputs.skip_standings }}" = "false" ]; then
            git commit -m "Build TFF data and standings from ${{ github.event.inputs.start_season }} (${{ github.event.inputs.max_seasons }} seasons)"
          else
            git commit -m "Build clean TFF data from ${{ github.event.inputs.start_season }} (${{ github.event.inputs.max_seasons }} seasons)"
          fi
          git checkout -- sources/tff/raw sources/tff/standings_raw reports/tff_factory/backups 2>/dev/null || true
          git clean -fd sources/tff/raw sources/tff/standings_raw reports/tff_factory/backups 2>/dev/null || true
          git pull --rebase --autostash origin main
          git push origin HEAD:main
