name: Refresh Firebase Active Users 30D

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: firebase-active-users-30d
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Firestore client
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-firebase-actions.txt

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          FIREBASE_SERVICE_ACCOUNT_BALKES_SKOR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BALKES_SKOR }}
        run: |
          python scripts/prepare_firebase_credentials.py

      - name: Refresh active users count
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -f "$GOOGLE_APPLICATION_CREDENTIALS"
          python scripts/firebase_active_users_30d.py
