name: Refresh Firebase Active Users 30D

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Firestore client
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-firestore

      - name: Refresh active users count
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_BALKES_SKOR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BALKES_SKOR }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$FIREBASE_SERVICE_ACCOUNT_BALKES_SKOR"
          echo "$FIREBASE_SERVICE_ACCOUNT_BALKES_SKOR" > /tmp/firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json
          python scripts/firebase_active_users_30d.py
